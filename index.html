  <script>
    const DATA={"version":1,"site":{"title":"船梨精の网络皇帝编年史","description":"神人船梨精这几年为了维持自己作为DMM资源圈网络皇帝干的破事","footer":"船梨精の网络皇帝编年史"},"preface":"船梨精是一位每天24小时打游戏跟网络冲浪且自诩为DMM前员工的人。\n\n但是根据海苔 (DMM圈著名氪金母🐖，目前DC账户已被封禁) 的描述，船梨精只是继承了过去老雷的圈子(最早的神姬Project离线就来自老雷的圈子由太阳制作)，并通过各种中间商方式进行空手套白狼维持着现在的人设。\n\n所谓的DMM员工其实就是之前老雷圈子里面确实在DMM工作的人，船梨精通过这些内部的讯息去找DMM页游播放器/离线作者并以此进行威逼利诱让各作者听命于他，之后再利用这些DMM页游播放器/离线资源在自己内部圈子分享收获献金与各类资源。\n\n本人只是一个赞颂欧姆尼塞亚的简单机仆，平时弄些离线分享给自己朋友方便查看游戏中各类内容或者技术分享进行各游戏的数据发掘。\n在2023/01/07被船梨精接触，由于本机仆的敏锐直觉到此人缺乏对技术的敬畏，遂并未与其有过多交互。\n而且这船梨精挺烦的天天说什么我离线哪里哪里外泄的，还试图让我去孤立我认识的比他早关系比他好得多得多的网友。\n\n直到2024/04/26，此人用下三滥手段(举报R18二次元CG图)把托马群爆破掉后我就直接与其彻底决裂不再接触。\n\n2026/07/12：反正受害者当事人都不在乎在那吃瓜，仅是间接受害者的我那就更没啥理由再去纠结这些破事，此档仅是用于记录与警示，不期望说服任何人。","events":[{"id":"event-1783917561515-2z9v64","date":"2022-07-13","title":"船梨精试图通过狐假虎威半胁迫的方式限制红凯的资源在小圈子中","text":"笑死了，这船梨精日常这样胡编乱造","tags":["红凯"],"images":["./images/2022-07-13_01.png","./images/2022-10-20_01.png"]},{"id":"315a0433-52d1-4c24-83c6-43663be92361","date":"2023-02-14","title":"拉点人也要管","text":"现在在船梨精那做工具人的waru之前可是直接被视为伸手党放黑名单的","tags":["EEF","waru"],"images":["./images/2023-02-14_01.png"]},{"id":"daf36def-4112-464c-a272-f68dc41a12de","date":"2023-05-15","title":"哈士奇与船梨精","text":"来源: https://docs.google.com/document/d/e/2PACX-1vTsg0gHt74DnzMjRrCtnWzPJ6MxEb3NSF059PpQEVRoqXMpzLq4H1Ex5eQ-sa5w5C587a945Rqu6zVB/pub\n\n由于船梨精发现没法管控哈士奇以及要到哈士奇的东西遂将其放入船梨精黑名单中并四处抹黑哈士奇，其中还能看到这船梨精各种传话筒记录，船梨精什么技术都不懂所以就一知半解直接复制其他人的问题来问另外的人。\n\n这船梨精搞个测试服网址都搞不到，哈士奇不给他就来找我，不自诩DMM员工吗？这种东西都搞不到？\n然后这人就各种拿着资源去各大公开群装逼秀优越，就如同哈士奇🎣记录的一样。","tags":["哈士奇"],"images":["./images/2023-05-15_01.png","./images/2023-05-15_02.png","./images/2023-05-15_03.png"]},{"id":"cdebddc0-7e8c-4276-9dc1-ffe93153f7d4","date":"2024-01-05","title":"船梨精の手段","text":"船梨精这人在他没法装逼的DC服务器一般称为蟑螂屋并把里面不服他“管教”的人放入他的黑名单，并搞各种小动作","tags":["举报"],"images":["./images/2024-01-05_01.png","./images/2024-01-05_02.png"]},{"id":"eb084431-0e83-4ea7-a180-e73ad97c3e1d","date":"2024-03-30","title":"船梨精警告托马兹不要接触船梨精黑名单上的人","text":"需要知道的前后事件\n\n在这之前由于金金(一个制作多款游戏剧情资源viewer的作者)一直处理的童前viewer资源在咸鱼上被一个倒🐕以800rmb左右出售给一个傻逼，然后这个傻逼还以此为吆喝完全公开出来，童话前线这游戏是需要氪金抽角色解锁剧情进行供档的，金金自己完全不希望这些东西被公开，后续也导致金金不再处理和发布更新。(那些天天找童前离线的可以好好感谢这个傻逼，让你们一直能找到旧版本)\n\n之后就出现一个叫“xu教授”的人，说要接手继续更新这个童前viewer，遂进了船黑名单，还有个原因就是这人被从宝石姬DC群被海苔踢出去过，原因是他在收集宝石姬剧情档案时试图教唆他人氪金给他收集档案。以本机仆感受来说，小年轻不懂事罢了，无所谓。但这船梨精作为这圈子的网络皇帝那肯定得趁机用海苔的名义追杀这个“xu教授”了，就有了后续的事情发生。\n\n首先是“xu教授”有个DC群来管理他的资源，托马兹就好奇过去看看玩玩，然后这船梨精也在里面，在里面天天谜语人装逼，举例来说就是隐晦炫耀自己有什么什么资源自己有哪些离线，结果就是船梨精被xu教授踢了出去，毕竟说话不像个人。但这船梨精哪能接受自己私有化的作者不听他的去他黑名单的服务器里聊天，就发生了附件图片内的剧情。\n\n图中也就船梨精大号小号各种要挟托马兹不去和这xu教授接触，包括但不限于给托马兹拔除掉船梨精DC群的权限，假装以DMM员工身份警告，各种找第三方进行胁迫等...\n\n里面的那个KARE也叫光永其实就是船小号，船用来唬人做白手套用的。\n截至目前2026/07/13，这个光永还在练习输入简体重生中......","tags":["托马兹"],"images":["./images/2024-03-30_01.png","./images/2024-03-30_02.png","./images/2024-03-30_03.png","./images/2024-04-09_01.png","./images/光永.png"]},{"id":"1eee5928-a74a-43f2-8609-0dc8ac451449","date":"2024-04-26","title":"托马兹群被炸当日","text":"真是好笑，这船梨精给人群炸了第一时间就去找第三方哭诉喊冤，咋不去找托马兹呢？哦，原来是给人家号永久封禁了。","tags":["托马兹"],"images":["./images/2024-04-26_01.jpg","./images/2024-04-26_02.jpg"]},{"id":"d6ac5590-fe1d-4467-9ccc-62a8134801ab","date":"2024-04-30","title":"试图踩我和托马兹来拉拢其他原本和托马兹有关系的人继续给他做事","text":"这船梨精还贴个自己受限的截图，一眼就能知道大概的经过，船梨精自己发涉及的R18图到托马兹的社区服，之后自己举报自己，再一副受害者的嘴脸去找不相干的第三方哭诉，咋不去找托马兹呢？","tags":["Andy","托马兹","EEF"],"images":["./images/2024-04-30_01.jpg","./images/2024-04-30_02.jpg","./images/2024-04-30_03.jpg","./images/2024-04-30_04.jpg","./images/2024-04-30_05.jpg","./images/2024-04-30_06.jpg","./images/2024-04-30_07.jpg","./images/2024-04-30_08.jpg","./images/2024-04-30_09.jpg","./images/2024-04-30_10.jpg"]},{"id":"1b48a364-32b2-4350-a604-89851301c441","date":"2024-05-28","title":"发现新技能——”炸群“の船梨精","text":"这一个月前不还在那哭诉不是自己干的吗？现在就又要开始预告炸群了(炸托马兹群之前给托马兹预告过，不过是和托马兹私聊预告的，预告消息的证据也一起和托马兹老DC账户消失了，记得还是假惺惺装作好心人说什么哎呀都怪你不听我的，现在群要被炸了你看怎么办吧)","tags":["举报"],"images":["./images/2024-05-28_01.png"]},{"id":"ab1a29ab-e617-4f63-9da3-bf87e3330326","date":"2024-06-13","title":"拿之前找第三方哭诉来自证的船梨精试图去拉拢海苔","text":"其中254也就是我前言中说的认识比船梨精早交情比船梨精好的网友，就因为问了哈士奇一句话，这船梨精就要求其他人开始孤立这254。我自己也是后续接触到哈士奇才发现原来这船梨精就因为这点破事去搞人。\n\n船梨精火急火燎的找海苔倾述，各种喊冤，毕竟之前可是用了海苔名号出去威风搞事的。\n最重要的是被搞得人现在号被完全封了，14天后就要变成delete user，直接死无对证咯~","tags":["254","海苔"],"images":["./images/2024-06-13_01.png","./images/2024-06-13_02.png","./images/2024-06-13_03.png","./images/2024-06-13_04.png","./images/2024-06-13_05.png","./images/2024-06-13_06.png","./images/2024-06-13_07.png","./images/2024-06-13_08.png","./images/2024-06-13_09.png","./images/2024-06-13_10.png","./images/2024-06-13_11.png","./images/2024-06-13_12.png","./images/2024-06-13_13.png","./images/2024-06-13_14.png","./images/2024-06-13_15.png","./images/2024-06-13_16.png","./images/2024-06-13_17.png"]},{"id":"a8eb94c6-ea0d-4292-81c0-369b12895a1f","date":"2024-06-21","title":"感觉事情完全结束了的船梨精又开始各种吹牛","text":"。。。这种东西真有人信吗？一个html都搞不懂的人谈BTC追溯\n\n船梨精吹牛也不是一天两天了 每天都在凹他这人设，之前船梨精用来打探DMM内部情报的DMM工作人员辞职了，他也同样发个丢DMM工作了要睡大街了，实际上steam一整天都在游戏中，最搞笑的就是他那DC还有一群人真信他说的。\n\n这些船梨精各种凹人设的事就懒得收集了，没眼看。\n想想挺乐的，一群人居然被这种人耍的团团转。","tags":[],"images":["./images/2024-06-21_01.png"]},{"id":"66b5b95e-1ca6-476b-a31b-29c2b3cb7280","date":"2024-06-24","title":"炸群后和苔海在其他服务器起争执","text":"苔海(452)之前炸群后在其他服务器指出这船梨精满口谎言到处搞事，和船梨精起来争执，然后被海苔开导后的船梨精反而变硬了，海苔究竟导了些什么呀？","tags":["452","海苔"],"images":["./images/2024-06-24_01.png"]},{"id":"b00eec10-063a-44ac-8b12-627b05d7f215","date":"2024-06-30","title":"船梨精在星骑士群搞事被逮捕","text":"来源：https://forum.gamer.com.tw/Co.php?bsn=78031&sn=530","tags":[],"images":[]},{"id":"6fc469b8-7cc8-464f-9049-183cf4c192a0","date":"2024-12-01","title":"船梨精自己对事件的梳理，信的建议谷歌搜索 “如何做聪明🐖”","text":"我来慢慢逐一反驳吧。\n\n1. 首先GKD那边其实就个QQ群，我当时才给人群主拉到DC这边来这傻逼船直接给人群炸了导致我和人家GKD群主再无任何人缘。其次我就喜欢在那群里水聊天分享我的东西在那边，关这船梨精屁事啊，老子写的全离线就在那边拉人到我DC来使用。\n2. 托马兹在南+上很多东西都托马兹自己发的，关你船梨精屁事，最后也是被南+用户给气走转自己内部小圈子更新的。\n3. 就这船梨精天天搞这些假消息在那烦我，我自己的东西放在哪怎么流出我自有方法，用不着这船梨精一副假惺惺的来管。\n4. 与 xu教授 无任何关系，目前都在一个群里面吹水，他现在也就天天对着鸡渊发些纯爱宣言罢了。\n5. 不清楚金金情况，反正xu教授只碰了下童话前线viewer后续也没见他继续更新了。\n6. 傻逼，ai都没这船梨精会编，因为ai会判断看的是不是带🧠的人。最后我现实中能量还没差到要你这种”网络皇帝“来帮我处理法务相关事情。\n7. 船梨精自己谷歌搜索wikipedia学习来的。\n8. 我认识的人关船梨精屁事。\n9. 不知道，与技术无关不关心。\n\n看最底下那个他DC人的回复就知道这群人有多离谱了。","tags":["EEF","托马兹"],"images":["./images/2024-xx-xx_01.png"]},{"id":"7460f92d-0ae2-4dc3-bafb-c17dbb57e069","date":"2026-05-31","title":"与大耳争斗大败的船梨精私有化公开发布viewer的作者ayato","text":"之前一年船梨精的各种破事就懒得找来贴了。\n\n船梨精发现这大耳居然在电报那边公开分享这船梨精视为珍宝的viewer，遂与其争斗，毕竟这动摇了船梨精的生态位。惨败被踢出电报的船梨精只好想个损招，就是直接去私信作者ayato各种蛐蛐，说什么中国人倒卖他的离线什么的吧啦吧啦的。之后就是真把ayato说服全部viewer不再进行公开并把ayato拉到自己的群里面。南+上公开传的很多离线部分就是ayato制作的。\n\n这船梨精的嘴脸也是恶心的不行，前脚拉拢完，后续就叫人家”棒哥“。","tags":[],"images":["./images/2026-05-31_01.png","./images/2026-05-31_02.png"]},{"id":"365cbcd2-912b-4bee-b702-97c3d93325b6","date":"2026-07-06","title":"大的来了，船梨精の鸿门宴","text":"前情提要：受害者为兰特，此人之前给船梨精提供过muv角色剧情档案，后续应不配合船梨精的卧底其他人的群偷取角色档案以及私自退群被船梨精举报报复，争辩无果后约在妖声群语音解决，这船还拉了个自己心腹假装为中间人实际是替船梨精说话的。\n有意思的是这妖声群之前还被船梨精纳入为蟑螂屋过，就因为这里的管理居然不给船梨精权力。\n\n语音开始：这两逼人就欺负兰特没麦克风，下贱的很，可惜这船自己没想到的是兰特给我们这边一大群人拉了过去进行摆头，这边建议有能力就自己去妖声群语音频道当时的文字聊天记录。\n\n结果就是船的鸿门宴大失败，自己的“丰功伟绩”被一箩筐的丢出来。\n\n至于船梨精的打手“白”之后再说。","tags":[],"images":["./images/2026-07-06_01.png","./images/2026-07-06_03.png","./images/2026-07-06_05.png","./images/2026-07-06_06.png","./images/2026-07-06_07.png","./images/2026-07-06_08.png","./images/2026-07-06_09.png","./images/2026-07-06_10.png","./images/2026-07-06_04.png","./images/2026-07-06_02.png"]},{"id":"8847c2de-9541-486f-98a0-e3740e42d056","date":"2026-07-07","title":"船梨精の鸿门宴——续","text":"后续我们专门讨论一番，发现这所谓的来做调解的“中间人”—— 白 明摆着就是船的打手。\n\n首先此人语音中各种看似中立发言实则各种打断，一方面又说不关他的事情，另一方面又一直在那说要证据（哪来的🍬逼玩意，对搞举报人下三滥手段的人要证据）。烦的要死，发言前后不一，一直替船说话。\n\n后续一整理一看，真难受啊，这人就是我在2022年年末帮忙做过妖怪MasterData分析的，一想到给这种🍬逼做过技术支持就觉得恶心。\n\n看这个白在船梨精DC那边的TAG，说明他地位可不低，几乎算最高档的了。他还敢在那一直自诩中立说事情与自己完全无关，都不知道他哪来的脸敢这么说的。他在被逮捕出来后就各种前后不一了，在那发长文解释，本质就顾左右而言他。他作为中立人的时候就在那咄咄逼人要证据，到自己问题上就“哎呀你再自己去查啊”，一副你找到的这个证据没有说服力。多说一嘴dc这种能随便删除信息的平台没什么查的必要。\n\n然后这逼人自己爆自己也就和船梨精金钱往来，看的我是真作呕恶心啊，船梨精拿着其他人的资源，然后这🍬逼觉得全是船梨精自己的还给他献金。我本人弄这些是完全不沾任何涉及金钱相关的。这种贱人我真是越看越作呕。在那不停试图洗刷自己帮船做打手的事实，真是恶心下头。\n这人不是喜欢在那一副ww嘴脸以为自己还能坐第三者位置观察说有趣不少有什么的吗？不说一直在那说也想吃瓜吗？这就给你这🍬逼也放瓜里，越是好你那面子那就越不给你台阶下，你就是个给钱把自己卖了的🍬逼。在那咖位咖位说半天，还要搞什么线下约见，还以为是什么有啥能量的人呢，结果蹦出来句“我玩妖怪大乱斗做过TOP1”，真是一个不知道哪来的玩氪金手游玩傻了的🍬逼。","tags":[],"images":["./images/2026-07-06_04.png","./images/2026-07-06_12.png","./images/2026-07-06_11.png","./images/2026-07-06_12.jpg"]}]};
    const state={keyword:'',tag:'全部'};
    const $=s=>document.querySelector(s);
    const esc=v=>String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
    const norm=v=>String(v??'').toLowerCase().trim();
    const nameOf=src=>String(src??'').split(/[\/]/).pop()||src;
    $('#title').textContent=DATA.site.title;$('#description').textContent=DATA.site.description;$('#footer').textContent=DATA.site.footer;
    if(DATA.preface){$('#preface').hidden=false;$('#prefaceText').textContent=DATA.preface}
    function render(){
      const tags=['全部',...new Set(DATA.events.flatMap(e=>e.tags||[]))];
      $('#tags').innerHTML=tags.map(t=>'<button class="tag '+(state.tag===t?'active':'')+'" data-tag="'+esc(t)+'">'+esc(t)+'</button>').join('');
      document.querySelectorAll('[data-tag]').forEach(b=>b.onclick=()=>{state.tag=b.dataset.tag;render()});
      const items=DATA.events.filter(e=>{const tag=state.tag==='全部'||(e.tags||[]).includes(state.tag);const text=norm([e.date,e.title,e.text,...(e.tags||[])].join(' '));return tag&&(!state.keyword||text.includes(norm(state.keyword)))});
      $('#timeline').innerHTML=items.map(e=>'<article class="item"><div class="card"><div class="main"><div class="meta"><span class="date">'+esc(e.date)+'</span>'+(e.tags||[]).map(t=>'<span class="badge">'+esc(t)+'</span>').join('')+'</div><h2>'+esc(e.title)+'</h2><p class="desc">'+esc(e.text)+'</p></div>'+((e.images||[]).length?'<div class="media-grid">'+e.images.map(src=>'<button class="media" data-src="'+esc(src)+'"><img src="'+esc(src)+'" loading="lazy"><span class="media-name">'+esc(nameOf(src))+'</span></button>').join('')+'</div>':'')+'</div></article>').join('');
      $('#empty').hidden=items.length>0;document.querySelectorAll('[data-src]').forEach(b=>b.onclick=()=>{$('#largeImage').src=b.dataset.src;$('#lightboxName').textContent=nameOf(b.dataset.src);$('#lightbox').classList.add('open')});
    }
    $('#search').oninput=e=>{state.keyword=e.target.value;render()};
    const close=()=>{$('#lightbox').classList.remove('open');$('#largeImage').src='';$('#lightboxName').textContent=''};$('#close').onclick=close;$('#lightbox').onclick=e=>{if(e.target===$('#lightbox'))close()};addEventListener('keydown',e=>{if(e.key==='Escape')close()});render();
  </script>
